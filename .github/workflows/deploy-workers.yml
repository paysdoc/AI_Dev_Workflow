name: Deploy Workers

on:
  push:
    branches:
      - main

jobs:
  discover:
    name: Discover workers
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.find.outputs.matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find workers
        id: find
        run: |
          dirs=$(find workers -maxdepth 2 -name wrangler.toml -printf '%h\n' | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "matrix=$dirs" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy ${{ matrix.dir }}
    runs-on: ubuntu-latest
    needs: discover
    if: needs.discover.outputs.matrix != '[]'
    strategy:
      fail-fast: false
      matrix:
        dir: ${{ fromJson(needs.discover.outputs.matrix) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: cd ${{ matrix.dir }} && npm install

      - name: Deploy worker
        run: cd ${{ matrix.dir }} && npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
