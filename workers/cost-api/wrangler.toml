name = "cost-api"
main = "src/index.ts"
compatibility_date = "2026-03-24"

# Route all requests for costs.paysdoc.nl to this Worker
[[routes]]
pattern = "costs.paysdoc.nl/*"
zone_name = "paysdoc.nl"

# Smart Placement — co-locates the Worker near the EU-jurisdiction D1 database
[placement]
mode = "smart"

# D1 database binding (EU jurisdiction)
# Created with: npx wrangler d1 create adw-costs --jurisdiction eu
[[d1_databases]]
binding = "DB"
database_name = "adw-costs"
database_id = "0b6b3419-ba17-45d5-95fc-9e878a5aafe3"
migrations_dir = "src/migrations"

# Required Worker secrets (set via `wrangler secret put`):
#   COST_API_TOKEN
#   ALLOWED_ORIGINS
